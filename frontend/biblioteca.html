<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Comunitária</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu">
        <h2>Biblioteca</h2>
        <button>Meus Livros</button>
        <button>Meus Pedidos</button>
        <button>Catálogo</button>
    </div>

    <div class="conteudo">
        <div class="topo">
            <h1>Sistema da Biblioteca</h1>
            <div class="pesquisa">
                <input type="text" placeholder="Procurar livros">
            </div>
        </div>

        <div class="lista-livros" id="resultadosBusca"></div>
    </div>

    <script>
        const livros = [
            {
                titulo: "Naruto Gold Vol. 25",
                autor: "Masashi Kishimoto",
                url_imagem: "https://m.media-amazon.com/images/I/71QYLrc-IQL.jpg",
                disponivel: true
            },
            {
                titulo: "Beyond The Story",
                autor: "Myeongseok Kang",
                url_imagem: "https://m.media-amazon.com/images/I/81fozPElIyL._UF1000,1000_QL80_.jpg",
                disponivel: false
            },
            {
                titulo: "O Horizonte Mora Em Um Dia Cinza",
                autor: "Tatielle Katluryn",
                url_imagem: "https://imgv2-1-f.scribdassets.com/img/word_document/720044759/original/8019ac30d4/1?v=1",
                disponivel: true
            },
            {
                titulo: "Diário de Um Banana",
                autor: "Jeff Kinney",
                url_imagem: "https://m.media-amazon.com/images/I/71fWaI5myqL.jpg",
                disponivel: true
            }
        ];

        const resultadosBusca = document.getElementById("resultadosBusca");

        resultadosBusca.innerHTML = "";

        livros.forEach(livro => {
            const card = document.createElement("div");
            card.classList.add("livro");

            card.innerHTML = `
                <img src="${livro.url_imagem}" alt="${livro.titulo}">
                <h3>${livro.titulo}</h3>
                <p>Autor: ${livro.autor}</p>
                <div class="status">${livro.disponivel ? "Disponível" : "Indisponível"}</div>
            `;

            resultadosBusca.appendChild(card);
        });
    </script>

</body>
</html>
